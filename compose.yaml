# Podman/Docker Compose for PII Redacta Development
# Usage: podman compose up -d

services:
  postgres:
    image: docker.io/postgres:17-alpine
    container_name: pii-redacta-postgres
    environment:
      POSTGRES_USER: pii_redacta
      POSTGRES_PASSWORD: pii_redacta_dev
      POSTGRES_DB: pii_redacta_dev
      # Enable UUID extension
      POSTGRES_INITDB_ARGS: "-E UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Mount migrations for sqlx-cli usage
      - ./crates/pii_redacta_core/migrations:/migrations:ro,z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pii_redacta -d pii_redacta_dev"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - pii-redacta-net

  redis:
    image: docker.io/redis:7-alpine
    container_name: pii-redacta-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - pii-redacta-net

  # Optional: Adminer for database browsing (lightweight alternative to pgAdmin)
  adminer:
    image: docker.io/adminer:latest
    container_name: pii-redacta-adminer
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pii-redacta-net
    profiles:
      - tools  # Only start with: podman compose --profile tools up -d

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  pii-redacta-net:
    driver: bridge
