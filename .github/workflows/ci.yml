name: CI

on:
  push:
    branches: [ main, develop, 'sprint/*' ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pii_redacta_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/pii_redacta_test
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/pii_redacta_test
      REDIS_URL: redis://localhost:6379
      API_KEY_SECRET: dGVzdC1hcGkta2V5LXNlY3JldC0zMi1ieXRlcw==
      SESSION_SECRET: dGVzdC1zZXNzaW9uLXNlY3JldC0zMi1ieXRlcw==
      JWT_SECRET: dGVzdC1qd3Qtc2VjcmV0LXRoYXQtaXMtMzItYnl0ZXM=

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    - name: Cache cargo dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Install sqlx-cli
      run: cargo install sqlx-cli --no-default-features --features postgres

    - name: Run database migrations
      run: sqlx migrate run --source crates/pii_redacta_core/migrations

    - name: Seed default tiers
      run: |
        psql "$DATABASE_URL" -c "
          INSERT INTO tiers (id, name, display_name, description, limits, features, monthly_price_cents, is_public, is_active, sort_order, created_at, updated_at)
          SELECT gen_random_uuid(), 'trial', 'Trial', 'Free trial tier',
            '{\"apiEnabled\":true,\"maxApiKeys\":2,\"maxFileSize\":5242880,\"maxFilesPerMonth\":10,\"maxPagesPerFile\":10,\"maxTotalSize\":52428800,\"playgroundMaxDaily\":5,\"playgroundMaxFileSize\":1048576,\"retentionDays\":7}'::jsonb,
            '{\"batchProcessing\":false,\"customRules\":false,\"emailSupport\":false,\"playground\":true,\"rateLimitPerMinute\":10,\"sla\":null,\"webhooks\":false}'::jsonb,
            0, true, true, 0, NOW(), NOW()
          WHERE NOT EXISTS (SELECT 1 FROM tiers WHERE name = 'trial');
        "

    - name: Check formatting
      run: cargo fmt --all -- --check

    - name: Run clippy
      run: cargo clippy --all-targets --all-features -- -D warnings

    - name: Build
      run: cargo build --all-targets --all-features

    - name: Run tests
      run: cargo test --all-features

    - name: Run doc tests
      run: cargo test --doc

    - name: Generate documentation
      run: cargo doc --no-deps --all-features
